<!DOCTYPE html>
<html lang="de"><head><meta charset="UTF-8"><title>test</title>
<style>
  body{font-family:'Trebuchet MS',sans-serif; background:#FBF6EC; margin:0; padding:30px; color:#2E2A24;}
  .mailcard{max-width:600px; margin:0 auto; background:#fffdf9; border:1px solid #D8CDB8; border-radius:14px; padding:30px; box-shadow:0 6px 18px rgba(60,50,20,.08);}
  .badge{display:inline-block; background:#3D6B7D; color:#fff; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:4px 12px; border-radius:20px; margin-bottom:16px;}
  .meta{font-size:13px; color:#6b6354; line-height:1.7; border-bottom:1px solid #D8CDB8; padding-bottom:14px; margin-bottom:18px;}
  .subject{font-size:19px; font-weight:800; margin:0 0 10px;}
  .body{white-space:pre-wrap; line-height:1.6; font-size:15px;}
  .footer{margin-top:24px; font-size:12px; color:#9a907c; text-align:center;}
</style></head>
<body>
  <div class="mailcard">
    <span class="badge">Übungs-Mail · Klasse 4b</span>
    <div class="subject">test</div>
    <div class="meta">
      Von: <strong>rita@4b.de</strong><br>
      An: chiara@4b.de<br>
      
      Datum: 30.6.2026 14:40
    </div>
    <div class="body">test nachricht</div>
  </div>
  <div class="footer">Diese Mail wurde im Rahmen der ÜbungsPost-Übung erstellt – kein echter Versand.</div>
</body></html>
